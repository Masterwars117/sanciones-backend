name: ${DOCKER_DEV_NAME}

services:
  django:
    build:
      context: ../../
      dockerfile: docker/dev/Dockerfile
    env_file:
      - ../../.env
    ports:
      - "${DOCKER_DEV_DJANGO_PORT}:8000"
    volumes:
      - ../../:/app
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py runserver 0.0.0.0:8000
      "
